name: Telegram_Bot_Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/telegrambot/**'
      - '.github/workflows/deploy.yml'
      - 'ecosystem.config.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_PUB_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # 1. 프로젝트 폴더 이동 및 코드 업데이트
            cd ~/agora
            git pull origin main
            
            # 2. 텔레그램 봇 폴더로 이동
            cd apps/telegrambot
            
            # 3. 가상환경 확인 및 패키지 설치 (효율적 업데이트)
            if [ ! -d ".venv" ]; then
                python3 -m venv .venv
            fi
            ./.venv/bin/pip install --upgrade pip
            ./.venv/bin/pip install -r requirements.txt
            
            # 4. 환경변수 주입 및 PM2 재시작
            export TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
            export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
            export GEMINI_KEY="${{ secrets.GEMINI_KEY }}"
            
            cd ~/agora
            pm2 restart ecosystem.config.js --env production
            