name: Deploy Agora System

on:
  push:
    branches: [ main ] # 메인 브랜치에 코드 푸시 시 작동

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_PUB_IP }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/agora
            git pull origin main
            
            # 가상환경 패키지 업데이트
            ./venv/bin/pip install -r apps/telegrambot/requirements.txt
            
            # 1순위: 시스템 환경변수 주입 (3-Tier Rule 준수)
            export TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
            export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
            export GEMINI_KEY="${{ secrets.GEMINI_KEY }}"
            
            # PM2로 봇 재시작 (운영 환경 설정 적용)
            pm2 restart ecosystem.config.js --env production
            pm2 save
